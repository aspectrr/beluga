# Beluga Configuration

# LLM configuration (OpenAI-compatible endpoint)
llm:
  endpoint: "${LLM_ENDPOINT}"
  api_key: "${LLM_API_KEY}"
  model: "anthropic/claude-sonnet-4"
  # Embedding is optional. If configured, extensions that support it
  # (like searchable_history) will use vector similarity for search.
  # If omitted, those extensions fall back to full-text search.
  # Set automatically during onboarding if embedding models are detected.
  # embedding_model: ""
  # embedding_dimensions: 0

# PostgreSQL database
database:
  host: "localhost"
  port: 5432
  name: "beluga"
  user: "beluga"
  password: "${BELUGA_DB_PASSWORD:-beluga}"
  sslmode: "disable"
  max_connections: 20

# Workspace sandbox defaults
workspace:
  docker_host: ""
  agent_image: "beluga/agent-workspace:latest"
  cpu_limit: "1.0"
  memory_limit: "1g"
  idle_timeout: "1h"
  network_mode: "none"

# Agent behavior
agent:
  max_iterations: 30
  max_context_tokens: 128000

# Extensions - each key maps to an extension name.
# The value is passed as json.RawMessage to the extension's Init().
# Order matters for dependencies (e.g. ext_host must come before remora).
extensions: {}
