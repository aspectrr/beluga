# ── Beluga Local Environment ────────────────────────────────────
# Boots the Beluga stack locally for development:
#   - PostgreSQL (session/event store)
#   - Beluga daemon (agent orchestrator, workspace manager)
#
# Prerequisites:
#   1. Run onboard:       beluga onboard  (creates .beluga/config.json)
#   2. Start everything:  docker compose up -d
#   3. Run migrations:    beluga db-push
#   4. Stop everything:   docker compose down
#
# Beluga exposes HTTP on :8080 (health, webhooks).

services:
  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:17
    container_name: beluga-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: beluga
      POSTGRES_USER: beluga
      POSTGRES_PASSWORD: beluga
    volumes:
      - beluga-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beluga"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - beluga

  # ── Beluga Daemon ──────────────────────────────────────────
  daemon:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: beluga-daemon
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_ENDPOINT: ${LLM_ENDPOINT:-}
      BELUGA_DB_HOST: postgres
      BELUGA_DB_PASSWORD: beluga
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./.beluga/config.json:/etc/beluga/config.json:ro
      - ./.beluga/extensions:/app/.beluga/extensions
    networks:
      - beluga

networks:
  beluga:
    name: beluga-local
    driver: bridge

volumes:
  beluga-pgdata:
