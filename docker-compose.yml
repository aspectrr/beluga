# ── Beluga Local Environment ────────────────────────────────────
# Boots the Beluga stack locally for development:
#   - PostgreSQL (session/event store)
#   - Beluga daemon (agent orchestrator, workspace manager)
#
# Prerequisites:
#   1. Run onboard:       beluga onboard  (creates .beluga/config.json)
#   2. Start everything:  docker compose up -d
#   3. Run migrations:    beluga db-push
#   4. Stop everything:   docker compose down
#
# Beluga exposes HTTP on :8080 (health, webhooks).
# Extension webhook listeners may use additional ports (e.g. :3099 for Linear).

services:
  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:17
    container_name: beluga-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: beluga
      POSTGRES_USER: beluga
      POSTGRES_PASSWORD: beluga
    volumes:
      - beluga-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beluga"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - beluga

  # ── Beluga Daemon ──────────────────────────────────────────
  daemon:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: beluga-daemon
    ports:
      - "8081:8080"
      - "3099:3099"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_API_ENDPOINT: ${LLM_API_ENDPOINT:-}
      LLM_MODEL: ${LLM_MODEL:-}
      BELUGA_DB_HOST: postgres
      BELUGA_DB_PASSWORD: beluga
      CLICKUP_API_TOKEN: ${CLICKUP_API_TOKEN:-}
      CLICKUP_TEAM_ID: ${CLICKUP_TEAM_ID:-}
      CLICKUP_SPACE_ID: ${CLICKUP_SPACE_ID:-}
      CLICKUP_LIST_ID: ${CLICKUP_LIST_ID:-}
      CLICKUP_AGENT_USERNAME: ${CLICKUP_AGENT_USERNAME:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./.beluga/config.json:/etc/beluga/config.json
      - ./.beluga/extensions:/etc/beluga/extensions
      - ./.beluga/agents:/etc/beluga/agents
      - ./.beluga/prompts:/etc/beluga/prompts
      - ./.beluga/data:/var/lib/beluga
      - ./workspace.Dockerfile:/etc/beluga/workspace.Dockerfile:ro
    networks:
      - beluga

networks:
  beluga:
    name: beluga-local
    driver: bridge

volumes:
  beluga-pgdata:
